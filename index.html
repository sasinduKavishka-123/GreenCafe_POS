<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Cafe</title>
    <link rel="icon" type="image/x-icon" href="assets/coffeeIcon.ico">

    <link rel="stylesheet" href="assets/lib/normalize.css">
    <link rel="stylesheet" href="cssStyles/cssStyles.css">

    <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ewert&family=Grandstander:ital,wght@0,100..900;1,100..900&family=Henny+Penny&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Pacifico&family=Playball&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Russo+One&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap" rel="stylesheet">

</head>
<body>

<!-- sidebar -->
<aside class="sideBar">
    <h1>Green Cafe</h1>
    <hr id="sidebarLine">
    <ol id="navBtnHolder">
        <li class="navBtn">
            <i class="fa-solid fa-house navIcons"></i> Dashboard
        </li>
        <li class="navBtn">
            <i class="fa-solid fa-cart-shopping"></i> POS
        </li>
        <li class="navBtn">
            <i class="fa-solid fa-user"></i> Customers
        </li>
        <li class="navBtn">
            <i class="fa-solid fa-mug-hot"></i> Items
        </li>
        <li class="navBtn">
            <i class="fa-solid fa-clipboard"></i> Orders
        </li>
    </ol>

    <button type="button" class="btn btn-outline-success logoutBtn">
        Log Out <i class="fa-solid fa-arrow-right-from-bracket"></i>
    </button>

</aside>

<!-- navbar -->
<nav id="navbar">
    <div class="navPointers"></div>
    <div class="navDataHolder">Date: 2026-04-23</div>

    <div class="navPointers"></div>
    <div class="navDataHolder">User: Sasindu Kavishka</div>
</nav>

<!-- main content -->
<main id="mainBody">

    <section id="dashboard" class="container">

        <!-- card container -->
        <div class="cardHolder row justify-content-md-center row-cols-3 row-cols-lg-5">

            <div class="card col ">
                <div class="card-body">
                    <h2 class="card-title" id="card-icon-1"><i class="fa-solid fa-cart-shopping"></i></h2>
                    <h5 class="card-subtitle mb-2 text-body-secondary">Total Orders</h5>
                    <h3 class="card-text">999</h3>
                </div>
            </div>

            <div class="card col ">
                <div class="card-body">
                    <h2 class="card-title" id="card-icon-2"><i class="fa-solid fa-dollar-sign"></i></h2>
                    <h5 class="card-subtitle mb-2 text-body-secondary">Total Revenue</h5>
                    <h3 class="card-text">999</h3>
                </div>
            </div>

            <div class="card col">
                <div class="card-body">
                    <h2 class="card-title" id="card-icon-3"><i class="fa-solid fa-mug-hot"></i></h2>
                    <h5 class="card-subtitle mb-2 text-body-secondary">Total Items</h5>
                    <h3 class="card-text">999</h3>
                </div>
            </div>

            <div class="card col">
                <div class="card-body">
                    <h2 class="card-title" id="card-icon-4"><i class="fa-solid fa-user"></i></h2>
                    <h5 class="card-subtitle mb-2 text-body-secondary">Total Customers</h5>
                    <h3 class="card-text">999</h3>
                </div>
            </div>

        </div>

        <!-- critical table -->
        <div class="dbTblHolder container">

            <table class="table table-hover caption-top table-bordered criticalTbl">
                <caption>Critical Stock Levels</caption>
                <thead>
                <tr>
                    <th scope="col">ID</th>
                    <th scope="col">Name</th>
                    <th scope="col">Qty</th>
                </tr>
                </thead>
                <tbody class="table-group-divider">
                <tr>
                    <th scope="row">1</th>
                    <td>Coffee</td>
                    <td>23</td>
                </tr>
                <tr>
                    <th scope="row">2</th>
                    <td>Tea</td>
                    <td>10</td>
                </tr>
                <tr>
                    <th scope="row">3</th>
                    <td>Toffee</td>
                    <td>12</td>
                </tr>
                </tbody>
            </table>

        </div>


    </section>

</main>

<!-- bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

<!-- font awesome -->
<script src="https://www.hxstrive.com/cdn/libs/font-awesome/7.0.1/js/all.min.js"></script>

</body>
</html>
